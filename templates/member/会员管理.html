<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>会员管理 — 易龙雪聚</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; font-family: Lexend, system-ui, sans-serif; }
  * { box-sizing: border-box; }
  @keyframes mbSlideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
  @keyframes mbFade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes mbSheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react" src="ios-frame.jsx"></script>
<script type="text/babel" data-presets="react" src="design-canvas.jsx"></script>
<script type="text/babel" data-presets="react" src="screens/tweaks-panel.jsx"></script>
<script type="text/babel" data-presets="react" src="screens/member-shared.jsx"></script>
<script type="text/babel" data-presets="react" src="screens/member-list-page.jsx"></script>
<script type="text/babel" data-presets="react" src="screens/member-detail-page.jsx"></script>
<script type="text/babel" data-presets="react" src="screens/member-tag-sheet.jsx"></script>
<script type="text/babel" data-presets="react" src="screens/member-register-page.jsx"></script>

<script type="text/babel" data-presets="react">
(() => {
const { IOSDevice, DesignCanvas, DCSection, DCArtboard,
  useTweaks, TweaksPanel, TweakSection, TweakColor, TweakRadio, TweakToggle,
  MemberMakeTokens, MemberCtx, MemberAccents,
  MemberListPage, MemberDetailDemo, MemberTagSheetDemo, MemberRegisterDemo } = window;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#006495",
  "density": "comfy",
  "storedValueMode": "total",
  "showMemberId": false,
  "tagStyle": "filled"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const T = MemberMakeTokens(t.accent);
  const opts = { accent: t.accent, density: t.density, storedValueMode: t.storedValueMode,
    showMemberId: t.showMemberId, tagStyle: t.tagStyle };

  const frame = (node) => (
    <IOSDevice width={402} height={874}>
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: T.bg }}>
        <div style={{ height: 54, flexShrink: 0 }} />
        <div style={{ flex: 1, minHeight: 0, position: 'relative' }}>{node}</div>
      </div>
    </IOSDevice>
  );

  return (
    <MemberCtx.Provider value={{ T, opts }}>
      <DesignCanvas>
        <DCSection id="members" title="会员管理" subtitle="列表 · 详情 · 标签维护 · 远程注册">
          <DCArtboard id="list" label="会员列表 · 筛选 + 紧凑行（点行进详情）" width={402} height={874}>
            {frame(<MemberListPage />)}
          </DCArtboard>
          <DCArtboard id="detail" label="会员详情 · 储值/龙珠/标签/账户（点「编辑」出弹层）" width={402} height={874}>
            {frame(<MemberDetailDemo />)}
          </DCArtboard>
          <DCArtboard id="tags" label="自定义标签编辑弹层" width={402} height={874}>
            {frame(<MemberTagSheetDemo />)}
          </DCArtboard>
          <DCArtboard id="register" label="店长远程注册会员（试 18601197897 看「已存在」）" width={402} height={874}>
            {frame(<MemberRegisterDemo />)}
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection label="外观" />
        <TweakColor label="强调色" value={t.accent} options={MemberAccents} onChange={(v) => setTweak('accent', v)} />
        <TweakRadio label="列表密度" value={t.density}
          options={[{ value: 'compact', label: '紧凑' }, { value: 'comfy', label: '舒适' }]}
          onChange={(v) => setTweak('density', v)} />
        <TweakSection label="列表字段" />
        <TweakRadio label="储值展示" value={t.storedValueMode}
          options={[{ value: 'split', label: 'A/B/C' }, { value: 'total', label: '仅合计' }]}
          onChange={(v) => setTweak('storedValueMode', v)} />
        <TweakToggle label="显示会员 ID" value={t.showMemberId} onChange={(v) => setTweak('showMemberId', v)} />
        <TweakSection label="标签" />
        <TweakRadio label="标签样式" value={t.tagStyle}
          options={[{ value: 'filled', label: '实底' }, { value: 'outline', label: '描边' }]}
          onChange={(v) => setTweak('tagStyle', v)} />
      </TweaksPanel>
    </MemberCtx.Provider>
  );
}

(function waitAndRender() {
  const need = ['IOSDevice', 'DesignCanvas', 'DCSection', 'DCArtboard', 'useTweaks', 'TweaksPanel',
    'TweakSection', 'TweakColor', 'TweakRadio', 'TweakToggle', 'MemberMakeTokens', 'MemberCtx', 'MemberAccents',
    'MemberListPage', 'MemberDetailDemo', 'MemberTagSheetDemo', 'MemberRegisterDemo'];
  if (!need.every((k) => window[k])) return setTimeout(waitAndRender, 30);
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
})();
})();
</script>

<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <rect width="100" height="100" fill="#006495"/>
    <circle cx="50" cy="38" r="15" fill="#cbe6ff"/>
    <rect x="24" y="60" width="52" height="26" rx="13" fill="#cbe6ff"/>
  </svg>
</template>
</body>
</html>
